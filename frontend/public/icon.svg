<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Pill capsule shape -->
  <g transform="translate(256,256) rotate(-45)">
    <!-- Left half -->
    <rect x="-120" y="-50" width="120" height="100" rx="50" fill="#6366f1"/>
    <!-- Right half -->
    <rect x="0" y="-50" width="120" height="100" rx="50" fill="#818cf8"/>
    <!-- Divider line -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#0f172a" stroke-width="3"/>
  </g>
  <!-- Checkmark -->
  <g transform="translate(256,256)">
    <polyline points="-20,5 -5,20 25,-15" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
